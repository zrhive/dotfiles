# vim:fileencoding=utf-8:foldmethod=marker
#: Overview of customization for kitty.conf
#: https://sw.kovidgoyal.net/kitty/overview/
#: https://sw.kovidgoyal.net/kitty/conf/

#: Themes {{{

# Catppuccin-Macchiato
include themes/catppuccin-macchiato.conf

#: }}}

#: Fonts {{{

font_family 		  JetBrainsMono Nerd Font
bold_font 		    JetBrainsMono Nerd Font Bold
italic_font 		  JetBrainsMono Nerd Font Italic
bold_italic_font 	JetBrainsMono Nerd Font Bold Italic

font_size 12.0

#: }}}

#: Text cursor customization {{{

cursor_beam_thickness 1
cursor_underline_thickness 1

cursor_trail 2
cursor_blink_interval -1 ease-in-out
cursor_trail_color #f0c6c6

#: }}}

#: Scrollback {{{

scrollbar_hitbox_expansion 1

#: }}}

#: Mouse {{{

mouse_hide_wait 2.0

url_style straight
detect_urls yes
show_hyperlink_targets yes
underline_hyperlinks hover

strip_trailing_spaces smart
focus_follows_mouse no

#: }}}

#: Performance tuning {{{

# repaint_delay 10
# input_delay 3
sync_to_monitor no

#: }}}

#: Terminal bell {{{

enable_audio_bell no
bell_on_tab " "

# command_on_bell none
# bell_path none
# linux_bell_theme __custom

#: }}}

#: Window layout {{{

remember_window_position yes
enabled_layouts Tall,Fat,Splits,Stack

window_padding_width 10
confirm_os_window_close 0

#: }}}

#: Tab bar {{{

tab_bar_style powerline
tab_powerline_style angled

# tab_bar_filter
tab_switch_strategy right

tab_activity_symbol *
tab_title_max_length 30
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{title}"
active_tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{title}"

#: }}}

#: Color scheme {{{

background_opacity 0.9
background_blur 1

#: }}}

#: Keyboard shortcuts {{{

kitty_mod ctrl+shift

# clear_all_shortcuts no

# action_alias

# kitten_alias

