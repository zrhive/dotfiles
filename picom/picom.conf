# vim:fileencoding=utf-8:foldmethod=marker
# ----------------------------------------
# picom: A compositor for X11
# ----------------------------------------
# Documentation for picom configuration:
# https://picom.app/
# ----------------------------------------

# [ CONFIGURATION ] {{{

# SHADOWS
shadow = true;
shadow-radius = 11;
shadow-opacity = 0.30;
shadow-offset-x = -2;
shadow-offset-y = -3;

# CORNERS
corner-radius = 10;

# BLUR
blur-method = "dual_kawase";
blur-strength = 2;
blur-background = true;

# GENERAL SETTINGS
backend = "glx";
vsync = true;
# dithered-present = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-client-leader = true;
detect-transient = true;
use-ewmh-active-win = true;
use-damage = true;
xrender-sync-fence = true
log-level = "warn";

# BASIC ANIMATIONS
animations = (
  {
    triggers = [ "open" ];
    preset = "appear";
    scale = 0.8;
    duration = 0.2;
  },
  {
    triggers = [ "close" ];
    preset = "disappear";
    scale = 0.8;
    duration = 0.2;
  },
  {
    triggers = [ "geometry" ];
    preset = "geometry-change";
    scale = 0.2;
  },
)

# }}}

# [ RULES ] {{{
# Rule-based per-window options.
# See `https://picom.app/#_window_rules` for options.
rules: (
  {
    match = "class_i = 'dwm'";
    corner-radius = 0;
  },
  {
    match = "class_i = 'rofi'";
    corner-radius = 0;
    opacity = 1.0;
  },
  {
    match = "class_i = 'Dunst'";
    corner-radius = 0;
    opacity = 1.0;
  },
  {
    match = "focused";
    opacity = 0.98;
    blur-background = true;
    shadow = true;
  },
  {
    match = "!focused";
    opacity = 0.90;
    blur-background = false;
    shadow = false;
  },
  {
    match = "fullscreen";
    corner-radius = 0;
    opacity = 1;
  },
  {
    match = "window_type = 'tooltip'";
    fade = true;
    shadow = true;
    opacity = 0.8;
    focus = true;
    full-shadow = false;
  },
  {
    match = "window_type = 'popup_menu'";
    opacity = 0.9;
  },
  {
    match = "window_type = 'dropdown_menu'";
    opacity = 0.9;
  },
)

# }}}
