# Yazi -- a terminal file manager -- https://github.com/sxyazi/yazi
# Preset: https://github.com/sxyazi/yazi/tree/main/yazi-config/preset

[mgr]
ratio          = [ 1, 2, 2 ]
sort_by        = "natural"
sort_sensitive = true
linemode       = "size"
show_hidden    = true
show_symlink   = false
scrolloff      = 10
mouse_events   = [ "click", "scroll", "touch", "move", "drag" ]
# title_format   = "Yazi: {cwd}"

[preview]
image_delay   = 50
image_filter  = "triangle"

[tasks]
image_alloc = 1073741824    # = 1024*1024*1024 = 1024MB

[input]
cursor_blink = true

[opener]
edit = [
	{ run = '$EDITOR "$@"', block = true, for = "unix" },
	{ run = 'sudoedit "$@"', block = true, for = "unix" },
]

[plugin]
  prepend_preloaders = [
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/subrip", run = "mediainfo" },
    { mime = "application/postscript", run = "mediainfo" },
    { mime = "application/illustrator", run = "mediainfo" },
    { mime = "application/dvb.ait", run = "mediainfo" },
    { mime = "application/vnd.adobe.illustrator", run = "mediainfo" },
    { mime = "image/x-eps", run = "mediainfo" },
    { mime = "application/eps", run = "mediainfo" },
    { url = "*.{ai,eps,ait}", run = "mediainfo" },
  ]
  prepend_previewers = [
    { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run  = "ouch" },
    { mime = "{audio,video,image}/*", run = "mediainfo"},
    { mime = "application/subrip", run = "mediainfo" },
    { mime = "application/postscript", run = "mediainfo" },
    { mime = "application/illustrator", run = "mediainfo" },
    { mime = "application/dvb.ait", run = "mediainfo" },
    { mime = "application/vnd.adobe.illustrator", run = "mediainfo" },
    { mime = "image/x-eps", run = "mediainfo" },
    { mime = "application/eps", run = "mediainfo" },
    { url = "*.{ai,eps,ait}", run = "mediainfo" },
  ]

