# ------------------------------
# Yazi
# ------------------------------
# a terminal file manager
# https://github.com/sxyazi/yazi
# ------------------------------

[mgr]
ratio          = [ 1, 2, 2 ]
sort_by        = "natural"
sort_sensitive = true
linemode       = "size_and_mtime"
show_hidden    = true
show_symlink   = false
scrolloff      = 10
mouse_events   = [ "click", "scroll", "touch", "move", "drag" ]

[tasks]
image_alloc = 1073741824    # = 1024*1024*1024 = 1024MB

[input]
cursor_blink = true

[preview]
image_delay = 50
image_filter = "lanczos3"
image_qualoty = 90

[opener]
edit = [
	{ run = "direnv exec . $EDITOR %s", desc = "$EDITOR",       for = "unix", block = true },
	{ run = "sudoedit %s",              desc = "sudo $EDITOR",  for = "unix", block = true },
]

[plugin]
prepend_preloaders = [
  # Media info
  { mime = "{audio,video,image}/*",             run = "mediainfo" },
  { mime = "application/subrip",                run = "mediainfo" },
  { mime = "application/postscript",            run = "mediainfo" },
  { mime = "application/illustrator",           run = "mediainfo" },
  { mime = "application/dvb.ait",               run = "mediainfo" },
  { mime = "application/vnd.adobe.illustrator", run = "mediainfo" },
  { mime = "image/x-eps",                       run = "mediainfo" },
  { mime = "application/eps",                   run = "mediainfo" },
  { url = "*.{ai,eps,ait}",                     run = "mediainfo" },
]
prepend_previewers = [
  # Ouch
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run  = "ouch" },
  # Media info
  { mime = "{audio,video,image}/*",             run = "mediainfo" },
  { mime = "application/subrip",                run = "mediainfo" },
  { mime = "application/postscript",            run = "mediainfo" },
  { mime = "application/illustrator",           run = "mediainfo" },
  { mime = "application/dvb.ait",               run = "mediainfo" },
  { mime = "application/vnd.adobe.illustrator", run = "mediainfo" },
  { mime = "image/x-eps",                       run = "mediainfo" },
  { mime = "application/eps",                   run = "mediainfo" },
  { url = "*.{ai,eps,ait}",                     run = "mediainfo" },
  # Piper
  { url = "*.tar*", run = 'piper --format=url -- tar tf "$1"' },
  { url = "*.md",   run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
]
